<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>News Explorer - Task 9</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top">
    <div class="search-wrap">
      <input id="search" type="search" placeholder="dolor sit" />
    </div>
    <h2 class="heading">Top stories for you</h2>
    <div id="tags" class="filters" aria-label="Categories"></div>
  </header>

  <main>
    <section id="hero" class="hero" aria-live="polite"></section>
    <section id="cards" class="cards-row"></section>
    <section id="moreList" class="more-list"></section>
    <div class="actions">
      <button id="showMore" class="btn">Show More</button>
    </div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
