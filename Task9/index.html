<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>News Explorer - Task 9</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <h1>News Explorer</h1>
    <p>Task 9 — implementing the assignment requirements only.</p>
  </header>

  <section class="controls">
    <div id="tags" class="tags"></div>
    <div class="search">
      <input id="search" type="search" placeholder="Search news..." />
    </div>
  </section>

  <main>
    <section id="newsGrid" class="news-grid" aria-live="polite"></section>
    <div class="actions">
      <button id="showMore" class="btn">Show More</button>
    </div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
