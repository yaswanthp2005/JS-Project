<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Currency Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="box">
    <h1>Currency Converter</h1>

    <p class="text">Enter amount</p>
    <input id="amount" type="number" placeholder="100" required min="1">

    <div class="row">
      <div class="select-box">
        <img id="flag1" src="" alt="flag">
        <select id="fromCurrency"></select>
      </div>

      <p class="to">TO</p>

      <div class="select-box">
        <img id="flag2" src="" alt="flag">
        <select id="toCurrency"></select>
      </div>
    </div>

    <button id="convertBtn">Convert</button>

    <p id="result" class="result" hidden>100 USD = 8,350.24 INR</p>
    <p id="error" class="error" hidden>An error occurred, please try again later</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
