<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Calculator - Task 6</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">
    <div class="display" id="display">0</div>
    <div class="keys">
      <button class="btn action" data-action="clear">C</button>
      <button class="btn action" data-action="delete">Del</button>
      <button class="btn action" data-action="percent">%</button>
      <button class="btn action" data-action="exp">Exp</button>

      <button class="btn number">7</button>
      <button class="btn number">8</button>
      <button class="btn number">9</button>
      <button class="btn action" data-action="operator">÷</button>

      <button class="btn number">4</button>
      <button class="btn number">5</button>
      <button class="btn number">6</button>
      <button class="btn action" data-action="operator">×</button>

      <button class="btn number">1</button>
      <button class="btn number">2</button>
      <button class="btn number">3</button>
      <button class="btn action" data-action="operator">-</button>

      <button class="btn number">0</button>
      <button class="btn number">.</button>
      <button class="btn action" data-action="equals">=</button>
      <button class="btn action" data-action="operator">+</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
